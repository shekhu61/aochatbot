services:
  # Backend API + Webhook server
  - type: web
    name: ao-agent-backend
    env: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WA_PHONE_NUMBER_ID
        sync: false
      - key: WA_ACCESS_TOKEN
        sync: false
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: BROCHURE_ICELAND
        sync: false
      - key: BROCHURE_LONDON
        sync: false
      - key: BROCHURE_CAMBODIA
        sync: false
      - key: BROCHURE_BHUTAN
        sync: false
      - key: BROCHURE_JAPAN
        sync: false

  # Dashboard (static site)
  - type: web
    name: ao-agent-dashboard
    env: static
    plan: starter
    rootDir: dashboard
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
