<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AO Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0f13;
  --bg2:#141519;
  --bg3:#1c1d24;
  --bg4:#23252f;
  --border:#2a2c38;
  --border2:#353848;
  --text:#e8eaf2;
  --text2:#9499b4;
  --text3:#5c607a;
  --orange:#ff6b2b;
  --orange2:#ff8c54;
  --orange-bg:rgba(255,107,43,0.1);
  --orange-border:rgba(255,107,43,0.25);
  --green:#2ecc8f;
  --green-bg:rgba(46,204,143,0.1);
  --red:#e85d75;
  --red-bg:rgba(232,93,117,0.1);
  --blue:#5b8dee;
  --blue-bg:rgba(91,141,238,0.1);
  --yellow:#f5a623;
  --yellow-bg:rgba(245,166,35,0.1);
  --radius:10px;
  --radius-sm:6px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --sidebar:260px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none}
input,textarea,select{font-family:var(--font)}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.logo-sub{font-size:11px;color:var(--text3);font-weight:400}
.sidebar-status{padding:12px 16px;border-bottom:1px solid var(--border)}
.status-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:var(--green-bg);padding:5px 10px;border-radius:20px;width:fit-content}
.status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.nav{padding:12px 10px;flex:1}
.nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin:12px 0 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--orange-bg);color:var(--orange)}
.nav-item .nav-icon{font-size:16px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}

.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.api-indicator{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}

/* Top bar */
.topbar{padding:0 28px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn{padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,93,117,.2)}

/* Content area */
.content{flex:1;overflow-y:auto;padding:24px 28px}

/* Stats row */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--border))}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:600;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* Panel */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:600;color:var(--text)}
.panel-sub{font-size:11px;color:var(--text3)}

/* Conversations list */
.conv-list{display:flex;flex-direction:column}
.conv-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 100px;gap:12px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.conv-row:last-child{border-bottom:none}
.conv-row:hover{background:var(--bg3)}
.conv-row.selected{background:var(--orange-bg)}
.conv-head{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.conv-name{font-size:13px;font-weight:500;color:var(--text)}
.conv-trip{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--text3)}

/* Status badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-warm{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
.badge-cold{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,141,238,.25)}
.badge-junk{background:var(--red-bg);color:var(--red);border:1px solid rgba(232,93,117,.2)}
.badge-new{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.badge-active{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,143,.2)}
.badge-closed{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}

/* Conversation detail */
.conv-detail{display:flex;height:calc(100vh - 56px - 48px);gap:16px}
.chat-panel{flex:1;display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-meta{flex:1}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{display:flex;flex-direction:column;max-width:75%}
.chat-msg.user{align-self:flex-end;align-items:flex-end}
.chat-msg.assistant{align-self:flex-start;align-items:flex-start}
.chat-bubble{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.chat-msg.user .chat-bubble{background:var(--orange);color:#fff;border-radius:12px 12px 3px 12px}
.chat-msg.assistant .chat-bubble{background:var(--bg3);color:var(--text);border-radius:12px 12px 12px 3px;border:1px solid var(--border)}
.chat-msg.assistant.nudge .chat-bubble{border-color:var(--yellow);background:var(--yellow-bg)}
.chat-ts{font-size:10px;color:var(--text3);margin-top:3px;padding:0 4px}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;color:var(--text);outline:none;resize:none}
.chat-input:focus{border-color:var(--orange)}

.lead-panel{width:280px;display:flex;flex-direction:column;gap:14px}
.lead-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.lead-card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.lead-field{margin-bottom:10px}
.lead-field-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.lead-field-value{font-size:13px;color:var(--text)}
.status-select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:12px;color:var(--text);outline:none}
.status-select:focus{border-color:var(--orange)}

/* Knowledge base */
.trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.trip-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .15s}
.trip-card:hover{border-color:var(--border2)}
.trip-card-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.trip-card-desc{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:12px}
.trip-card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.trip-meta-tag{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;color:var(--text2)}
.trip-agent{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.trip-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* Settings */
.settings-section{margin-bottom:24px}
.settings-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.settings-label{font-size:13px;color:var(--text)}
.settings-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:36px;height:20px;background:var(--bg4);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--orange)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(16px)}
.input-field{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;color:var(--text);outline:none;width:200px}
.input-field:focus{border-color:var(--orange)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:500px;max-height:80vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);outline:none}
.form-input:focus{border-color:var(--orange)}
.form-textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Empty state */
.empty{padding:48px;text-align:center;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
.empty-sub{font-size:12px;margin-top:4px}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px}
.tab{padding:5px 14px;border-radius:5px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .15s;background:transparent;border:none}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* Search */
.search-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;color:var(--text);outline:none;width:220px}
.search-bar:focus{border-color:var(--orange)}
.search-bar::placeholder{color:var(--text3)}

/* Filter chips */
.filters{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--bg3);color:var(--text3)}
.chip:hover,.chip.active{border-color:var(--orange);background:var(--orange-bg);color:var(--orange)}
</style>
</head>
<body>
<div class="shell" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🏔️</div>
        <div>
          <div class="logo-text">AO Agent</div>
          <div class="logo-sub">Adventures Overland</div>
        </div>
      </div>
    </div>
    <div class="sidebar-status">
      <div class="status-pill"><span class="status-dot"></span> Agent online</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Overview</div>
      <div class="nav-item active" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </div>
      <div class="nav-section">Leads</div>
      <div class="nav-item" onclick="navigate('conversations')">
        <span class="nav-icon">💬</span> Conversations
        <span class="nav-badge" id="active-badge">0</span>
      </div>
      <div class="nav-section">Config</div>
      <div class="nav-item" onclick="navigate('trips')">
        <span class="nav-icon">🗺️</span> Trip Knowledge Base
      </div>
      <div class="nav-item" onclick="navigate('settings')">
        <span class="nav-icon">⚙️</span> Agent Settings
      </div>
      <div class="nav-item" onclick="navigate('test')">
        <span class="nav-icon">🧪</span> Test Lead
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="api-indicator">
        <span style="color:var(--green)">●</span>
        Claude claude-sonnet-4 · Meta API
      </div>
      <div class="api-indicator" style="margin-top:4px" id="backend-status">
        <span style="color:var(--yellow)">●</span>
        Connecting to backend…
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE = window.AO_API_BASE || 'http://localhost:3000/api';

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  page: 'dashboard',
  stats: null,
  conversations: [],
  trips: [],
  selectedConv: null,
  filter: 'all',
  search: '',
  settings: {
    nudge1: 120, nudge2: 1440, nudge3: 2880,
    autoQualify: true, sendBrochureAuto: true,
    agentHandoffAuto: true, systemPromptAddition: ''
  }
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  try {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + path, opts);
    return await res.json();
  } catch(e) {
    console.error('API error', e);
    return null;
  }
}

async function loadStats() {
  const data = await api('/stats');
  if (data) state.stats = data;
}

async function loadConversations() {
  const data = await api('/conversations');
  if (data) state.conversations = data;
}

async function loadTrips() {
  const data = await api('/trips');
  if (data) state.trips = data;
}

async function loadConvDetail(phone) {
  return await api('/conversations/' + encodeURIComponent(phone));
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function navigate(page) {
  state.page = page;
  state.selectedConv = null;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.nav-item');
  const pages = ['dashboard','conversations','trips','settings','test'];
  const idx = pages.indexOf(page);
  if (idx >= 0) items[idx + 2]?.classList.add('active');
  if (page === 'dashboard') items[0]?.classList.add('active');
  render();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function badgeHtml(status) {
  const map = {WARM:'warm',COLD:'cold',JUNK:'junk',NEW:'new',active:'active',closed:'closed'};
  return `<span class="badge badge-${map[status]||'new'}">${status}</span>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const pages = {dashboard:renderDashboard, conversations:renderConversations, trips:renderTrips, settings:renderSettings, test:renderTest};
  document.getElementById('content').innerHTML = (pages[state.page] || renderDashboard)();
  document.getElementById('page-title').textContent = {dashboard:'Dashboard',conversations:'Conversations',trips:'Trip Knowledge Base',settings:'Agent Settings',test:'Test Lead Simulator'}[state.page]||'';
  document.getElementById('topbar-actions').innerHTML = topbarActions();
  attachEventListeners();
}

function topbarActions() {
  if (state.page === 'conversations') return `
    <input class="search-bar" placeholder="Search by name or trip…" id="search-input" value="${state.search}" oninput="state.search=this.value;renderConvList()"/>
    <div class="filters">
      ${['all','WARM','COLD','JUNK','NEW'].map(f=>`<div class="chip ${state.filter===f?'active':''}" onclick="state.filter='${f}';renderConvList()">${f}</div>`).join('')}
    </div>`;
  if (state.page === 'trips') return `<button class="btn btn-primary" onclick="openTripModal()">+ Add Trip</button>`;
  return '';
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard() {
  const s = state.stats || {};
  const recentConvs = state.conversations.slice(0,5);
  return `
  <div class="stats-grid">
    <div class="stat-card" style="--accent:var(--orange)">
      <div class="stat-label">Total Leads</div>
      <div class="stat-value">${s.totalLeads||0}</div>
      <div class="stat-sub">All time</div>
    </div>
    <div class="stat-card" style="--accent:var(--green)">
      <div class="stat-label">🔥 Warm Leads</div>
      <div class="stat-value">${s.warm||0}</div>
      <div class="stat-sub">Actively interested</div>
    </div>
    <div class="stat-card" style="--accent:var(--blue)">
      <div class="stat-label">🧊 Cold Leads</div>
      <div class="stat-value">${s.cold||0}</div>
      <div class="stat-sub">Low engagement</div>
    </div>
    <div class="stat-card" style="--accent:var(--text3)">
      <div class="stat-label">🗑 Junk</div>
      <div class="stat-value">${s.junk||0}</div>
      <div class="stat-sub">Filtered out</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px">
    <div class="stat-card" style="--accent:var(--yellow)">
      <div class="stat-label">Messages Handled</div>
      <div class="stat-value">${s.messagesHandled||0}</div>
    </div>
    <div class="stat-card" style="--accent:var(--orange)">
      <div class="stat-label">Brochures Sent</div>
      <div class="stat-value">${s.brochuresSent||0}</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Recent Conversations</div>
      <button class="btn btn-ghost" onclick="navigate('conversations')">View all →</button>
    </div>
    ${recentConvs.length ? `
    <div class="conv-list">
      <div class="conv-row conv-head"><div>Lead</div><div>Trip</div><div>Status</div><div>Last Message</div><div>Time</div></div>
      ${recentConvs.map(c => `
      <div class="conv-row" onclick="openConvDetail('${c.phone}')">
        <div><div class="conv-name">${c.leadName}</div><div class="conv-trip">${c.phone}</div></div>
        <div class="conv-trip">${c.tripName}</div>
        <div>${badgeHtml(c.leadStatus)}</div>
        <div class="conv-preview">${c.lastMessage||'—'}</div>
        <div class="conv-time">${timeAgo(c.lastMessageAt)}</div>
      </div>`).join('')}
    </div>` : `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No conversations yet</div><div class="empty-sub">Connect your Zoho webhook to start receiving leads</div></div>`}
  </div>`;
}

// ─── CONVERSATIONS ────────────────────────────────────────────────────────────
function renderConversations() {
  if (state.selectedConv) return renderConvDetail(state.selectedConv);
  return `<div class="panel" id="conv-list-panel">${convListHtml()}</div>`;
}

function convListHtml() {
  let convs = state.conversations;
  if (state.filter !== 'all') convs = convs.filter(c => c.leadStatus === state.filter);
  if (state.search) convs = convs.filter(c => (c.leadName+c.tripName+c.phone).toLowerCase().includes(state.search.toLowerCase()));
  if (!convs.length) return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No conversations match</div></div>`;
  return `
  <div class="conv-list">
    <div class="conv-row conv-head"><div>Lead</div><div>Trip</div><div>Status</div><div>Last Message</div><div>Time</div></div>
    ${convs.map(c => `
    <div class="conv-row" onclick="openConvDetail('${c.phone}')">
      <div><div class="conv-name">${c.leadName}</div><div class="conv-trip">${c.phone}</div></div>
      <div class="conv-trip">${c.tripName}</div>
      <div>${badgeHtml(c.leadStatus)} ${badgeHtml(c.status)}</div>
      <div class="conv-preview">${c.lastMessage||'No messages yet'}</div>
      <div class="conv-time">${timeAgo(c.lastMessageAt)}</div>
    </div>`).join('')}
  </div>`;
}

function renderConvList() {
  const panel = document.getElementById('conv-list-panel');
  if (panel) panel.innerHTML = convListHtml();
}

async function openConvDetail(phone) {
  const conv = await loadConvDetail(phone);
  if (!conv) return;
  state.selectedConv = conv;
  state.page = 'conversations';
  render();
  setTimeout(scrollChatBottom, 50);
}

function scrollChatBottom() {
  const msgs = document.querySelector('.chat-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function renderConvDetail(conv) {
  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <button class="btn btn-ghost" onclick="state.selectedConv=null;render()">← Back</button>
    <span style="color:var(--text3);font-size:13px">${conv.leadName} · ${conv.tripName}</span>
  </div>
  <div class="conv-detail">
    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-meta">
          <div style="font-size:14px;font-weight:600">${conv.leadName}</div>
          <div style="font-size:11px;color:var(--text3)">${conv.phone} · ${conv.tripName} · ${conv.messageCount||conv.messages?.length||0} messages</div>
        </div>
        <div style="display:flex;gap:8px">
          ${badgeHtml(conv.leadStatus)}
          ${badgeHtml(conv.status)}
          <button class="btn btn-ghost" style="font-size:11px" onclick="closeConv('${conv.phone}')">Close conv</button>
        </div>
      </div>
      <div class="chat-messages" id="chat-msgs">
        ${!conv.messages?.length ? '<div class="empty"><div class="empty-text">No messages yet</div></div>' :
          conv.messages.map(m => `
          <div class="chat-msg ${m.role} ${m.isNudge?'nudge':''}">
            <div class="chat-bubble">${escHtml(m.content)}</div>
            <div class="chat-ts">${m.isManual?'👤 Manual · ':''} ${m.isNudge?'⏰ Nudge · ':''} ${new Date(m.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
          </div>`).join('')
        }
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="manual-msg" rows="1" placeholder="Send a manual message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendManual('${conv.phone}')}"></textarea>
        <button class="btn btn-primary" onclick="sendManual('${conv.phone}')">Send</button>
      </div>
    </div>
    <div class="lead-panel">
      <div class="lead-card">
        <div class="lead-card-title">Lead Info</div>
        <div class="lead-field"><div class="lead-field-label">Name</div><div class="lead-field-value">${conv.leadName}</div></div>
        <div class="lead-field"><div class="lead-field-label">Phone</div><div class="lead-field-value" style="font-family:var(--mono);font-size:12px">${conv.phone}</div></div>
        <div class="lead-field"><div class="lead-field-label">Trip</div><div class="lead-field-value">${conv.tripName}</div></div>
        <div class="lead-field"><div class="lead-field-label">Zoho Lead ID</div><div class="lead-field-value" style="font-family:var(--mono);font-size:11px;color:var(--text3)">${conv.leadId||'—'}</div></div>
        <div class="lead-field"><div class="lead-field-label">Nudges Sent</div><div class="lead-field-value">${conv.nudgesSent||0} / 3</div></div>
        <div class="lead-field"><div class="lead-field-label">Created</div><div class="lead-field-value" style="font-size:12px">${new Date(conv.createdAt).toLocaleString('en-IN')}</div></div>
      </div>
      <div class="lead-card">
        <div class="lead-card-title">Lead Status</div>
        <select class="status-select" id="status-select" onchange="updateStatus('${conv.phone}',this.value)">
          ${['NEW','WARM','COLD','JUNK'].map(s=>`<option value="${s}" ${conv.leadStatus===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">Changes sync to Zoho CRM automatically</div>
      </div>
      ${conv.tripInfo ? `
      <div class="lead-card">
        <div class="lead-card-title">Trip Info</div>
        <div class="lead-field"><div class="lead-field-label">Duration</div><div class="lead-field-value" style="font-size:12px">${conv.tripInfo.duration||'—'}</div></div>
        <div class="lead-field"><div class="lead-field-label">Price</div><div class="lead-field-value" style="font-size:12px;color:var(--orange)">${conv.tripInfo.price||'—'}</div></div>
        <div class="lead-field"><div class="lead-field-label">Agent</div><div class="lead-field-value" style="font-size:12px">${conv.tripInfo.agentContact?.name||'—'}</div></div>
      </div>` : ''}
    </div>
  </div>`;
}

// ─── TRIPS ────────────────────────────────────────────────────────────────────
function renderTrips() {
  return `
  <div class="trip-grid">
    ${state.trips.map(t => `
    <div class="trip-card">
      <div class="trip-card-name">${t.name}</div>
      <div class="trip-card-desc">${t.description||'No description'}</div>
      <div class="trip-card-meta">
        ${t.duration ? `<div class="trip-meta-tag">📅 ${t.duration}</div>` : ''}
        ${t.price ? `<div class="trip-meta-tag">💰 ${t.price}</div>` : ''}
        ${t.brochureUrl ? `<div class="trip-meta-tag" style="color:var(--green);border-color:rgba(46,204,143,.2)">📄 Brochure ✓</div>` : `<div class="trip-meta-tag" style="color:var(--red)">📄 No brochure</div>`}
      </div>
      ${t.highlights?.length ? `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">${t.highlights.slice(0,3).map(h=>`✦ ${h}`).join(' &nbsp;')}</div>` : ''}
      <div class="trip-agent">🧑‍💼 ${t.agentContact?.name||'No agent assigned'} ${t.agentContact?.phone?`· ${t.agentContact.phone}`:''}</div>
      <div class="trip-actions">
        <button class="btn btn-ghost" onclick="openEditTripModal('${t.name}')" style="flex:1;font-size:11px">Edit</button>
        ${t.brochureUrl ? `<button class="btn btn-ghost" onclick="window.open('${t.brochureUrl}')" style="font-size:11px">View PDF</button>` : ''}
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function renderSettings() {
  const s = state.settings;
  return `
  <div style="max-width:640px">
    <div class="settings-section">
      <div class="settings-title">Inactivity Nudges</div>
      <div class="settings-row">
        <div><div class="settings-label">Nudge 1 — First follow-up</div><div class="settings-desc">Sent after X minutes of no reply</div></div>
        <input class="input-field" type="number" value="${s.nudge1}" min="30" style="width:100px" oninput="state.settings.nudge1=this.value"/> min
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Nudge 2 — Second follow-up</div><div class="settings-desc">Sent after X minutes total silence</div></div>
        <input class="input-field" type="number" value="${s.nudge2}" min="60" style="width:100px" oninput="state.settings.nudge2=this.value"/> min
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Nudge 3 — Final follow-up</div><div class="settings-desc">Last attempt before marking cold</div></div>
        <input class="input-field" type="number" value="${s.nudge3}" min="120" style="width:100px" oninput="state.settings.nudge3=this.value"/> min
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Agent Behaviour</div>
      <div class="settings-row">
        <div><div class="settings-label">Auto-qualify leads</div><div class="settings-desc">AI updates WARM/COLD/JUNK automatically</div></div>
        <div class="toggle ${s.autoQualify?'on':''}" onclick="state.settings.autoQualify=!state.settings.autoQualify;render()"></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Auto-send brochures</div><div class="settings-desc">AI sends PDF when user asks for details</div></div>
        <div class="toggle ${s.sendBrochureAuto?'on':''}" onclick="state.settings.sendBrochureAuto=!state.settings.sendBrochureAuto;render()"></div>
      </div>
      <div class="settings-row">
        <div><div class="settings-label">Auto agent handoff</div><div class="settings-desc">AI shares agent contact when user is ready to book</div></div>
        <div class="toggle ${s.agentHandoffAuto?'on':''}" onclick="state.settings.agentHandoffAuto=!state.settings.agentHandoffAuto;render()"></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Environment Variables</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-family:var(--mono);font-size:12px;color:var(--text3);line-height:2">
          WA_PHONE_NUMBER_ID=<span style="color:var(--orange)">your_value</span><br>
          WA_ACCESS_TOKEN=<span style="color:var(--orange)">your_token</span><br>
          WA_VERIFY_TOKEN=<span style="color:var(--orange)">your_secret</span><br>
          ANTHROPIC_API_KEY=<span style="color:var(--orange)">sk-ant-...</span><br>
          ZOHO_CLIENT_ID=<span style="color:var(--orange)">your_client_id</span><br>
          ZOHO_REFRESH_TOKEN=<span style="color:var(--orange)">your_token</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">Set these in Render/Railway dashboard under Environment Variables. Never commit .env to git.</div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Webhook URLs</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">WhatsApp Meta dashboard → Webhook URL:</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg3);padding:8px 12px;border-radius:6px">https://your-server.render.com/webhook/whatsapp</div>
        <div style="font-size:11px;color:var(--text3);margin:12px 0 8px">Zoho CRM → Setup → Automation → Webhooks:</div>
        <div style="font-family:var(--mono);font-size:12px;color:var(--text);background:var(--bg3);padding:8px 12px;border-radius:6px">https://your-server.render.com/webhook/zoho</div>
      </div>
    </div>
  </div>`;
}

// ─── TEST ────────────────────────────────────────────────────────────────────
function renderTest() {
  return `
  <div style="max-width:500px">
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Simulate a New Lead</div></div>
      <div style="padding:20px">
        <div class="form-group"><label class="form-label">Lead Name</label><input class="form-input" id="t-name" placeholder="e.g. Ramesh Kumar" value="Ramesh Kumar"/></div>
        <div class="form-group"><label class="form-label">Phone Number (with country code)</label><input class="form-input" id="t-phone" placeholder="919876543210" value="919876543210"/></div>
        <div class="form-group">
          <label class="form-label">Trip Name</label>
          <select class="form-input" id="t-trip">
            ${state.trips.map(t=>`<option>${t.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Zoho Lead ID (optional)</label><input class="form-input" id="t-leadid" placeholder="TEST-001"/></div>
        <button class="btn btn-primary" onclick="simulateLead()" style="width:100%;justify-content:center;padding:10px">Simulate Lead → Send WhatsApp Template</button>
        <div id="test-result" style="margin-top:12px;font-size:13px;color:var(--green)"></div>
      </div>
    </div>
  </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendManual(phone) {
  const el = document.getElementById('manual-msg');
  const text = el?.value?.trim();
  if (!text) return;
  el.value = '';
  const res = await api('/conversations/'+encodeURIComponent(phone)+'/message','POST',{text});
  if (res?.success) {
    state.selectedConv.messages.push({role:'assistant',content:text,ts:new Date(),isManual:true});
    const msgs = document.getElementById('chat-msgs');
    if (msgs) {
      msgs.insertAdjacentHTML('beforeend',`
        <div class="chat-msg assistant"><div class="chat-bubble">${escHtml(text)}</div><div class="chat-ts">👤 Manual · just now</div></div>`);
      msgs.scrollTop = msgs.scrollHeight;
    }
  }
}

async function updateStatus(phone, status) {
  await api('/conversations/'+encodeURIComponent(phone)+'/status','PATCH',{status});
}

async function closeConv(phone) {
  await api('/conversations/'+encodeURIComponent(phone)+'/close','PATCH');
  state.selectedConv = null;
  await loadConversations();
  render();
}

async function simulateLead() {
  const res = await api('/test/lead','POST',{
    phone: document.getElementById('t-phone').value,
    leadName: document.getElementById('t-name').value,
    tripName: document.getElementById('t-trip').value,
    leadId: document.getElementById('t-leadid').value || 'TEST-001'
  });
  const el = document.getElementById('test-result');
  if (el) el.textContent = res?.message || (res?.success ? '✅ Lead simulated!' : '❌ Error');
  await loadConversations();
  await loadStats();
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function openTripModal(existingName) {
  const trip = existingName ? state.trips.find(t=>t.name===existingName) : null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">${trip?'Edit':'Add'} Trip</div>
      <div class="modal-sub">This info is used by the AI agent to answer customer questions</div>
      <div class="form-group"><label class="form-label">Trip Name</label><input class="form-input" id="m-name" value="${escHtml(trip?.name||'')}" ${trip?'readonly':''}></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-input form-textarea" id="m-desc">${escHtml(trip?.description||'')}</textarea></div>
      <div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="m-dur" value="${escHtml(trip?.duration||'')}"></div>
      <div class="form-group"><label class="form-label">Price</label><input class="form-input" id="m-price" value="${escHtml(trip?.price||'')}"></div>
      <div class="form-group"><label class="form-label">Brochure PDF URL</label><input class="form-input" id="m-brochure" value="${escHtml(trip?.brochureUrl||'')}" placeholder="https://..."></div>
      <div class="form-group"><label class="form-label">Agent Name</label><input class="form-input" id="m-agent-name" value="${escHtml(trip?.agentContact?.name||'')}"></div>
      <div class="form-group"><label class="form-label">Agent Phone</label><input class="form-input" id="m-agent-phone" value="${escHtml(trip?.agentContact?.phone||'')}"></div>
      <div class="form-group"><label class="form-label">Agent Email</label><input class="form-input" id="m-agent-email" value="${escHtml(trip?.agentContact?.email||'')}"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTrip('${existingName||''}')">Save Trip</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function openEditTripModal(name) { openTripModal(name); }

async function saveTrip(existingName) {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  const data = {
    description: document.getElementById('m-desc').value,
    duration: document.getElementById('m-dur').value,
    price: document.getElementById('m-price').value,
    brochureUrl: document.getElementById('m-brochure').value,
    agentContact: {
      name: document.getElementById('m-agent-name').value,
      phone: document.getElementById('m-agent-phone').value,
      email: document.getElementById('m-agent-email').value
    }
  };
  if (existingName) await api('/trips/'+encodeURIComponent(existingName),'PUT',data);
  else await api('/trips','POST',{name,...data});
  await loadTrips();
  document.querySelector('.modal-overlay')?.remove();
  render();
}

function attachEventListeners() {}

// ─── INIT + POLL ──────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadStats(), loadConversations(), loadTrips()]);
  const backendEl = document.getElementById('backend-status');

  // Check backend
  try {
    const res = await fetch(API_BASE.replace('/api','') + '/health');
    const d = await res.json();
    if (d.status === 'ok' && backendEl) {
      backendEl.innerHTML = '<span style="color:var(--green)">●</span> Backend connected';
    }
  } catch(e) {
    if (backendEl) backendEl.innerHTML = '<span style="color:var(--red)">●</span> Backend offline';
  }

  const activeBadge = document.getElementById('active-badge');
  if (activeBadge) activeBadge.textContent = state.conversations.filter(c=>c.status==='active').length;

  render();

  // Poll every 15s
  setInterval(async () => {
    await Promise.all([loadStats(), loadConversations()]);
    const badge = document.getElementById('active-badge');
    if (badge) badge.textContent = state.conversations.filter(c=>c.status==='active').length;
    if (state.page === 'dashboard' || (state.page === 'conversations' && !state.selectedConv)) render();
  }, 15000);
}

init();
</script>
</body>
</html>
